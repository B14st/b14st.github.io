<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f4c75">
  <title>Flis & Gulv — Formelsamling</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">

    <!-- ── LIST VIEW ── -->
    <div id="list-view" class="view active">
      <header class="app-header">
        <div class="header-inner">
          <div class="header-branding">
            <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="2" width="9" height="9" rx="1"/>
              <rect x="13" y="2" width="9" height="9" rx="1"/>
              <rect x="2" y="13" width="9" height="9" rx="1"/>
              <rect x="13" y="13" width="9" height="9" rx="1"/>
            </svg>
            <div>
              <h1 class="app-title">ByggLogikk</h1>
              <p class="app-subtitle">Alt du trenger, samlet i én app</p>
            </div>
          </div>
          <div class="search-wrap">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            <input type="search" id="search" placeholder="Søk…" autocomplete="off" autocorrect="off" spellcheck="false">
            <button class="search-clear" id="search-clear" aria-label="Fjern søk">✕</button>
          </div>
        </div>
      </header>

      <div class="category-bar" id="category-bar">
        <button class="chip active" data-cat="all">Alle</button>
      </div>

      <main id="topic-list" class="topic-list"></main>
      <p class="empty-msg" id="empty-msg" hidden>Ingen emner samsvarer med søket ditt.</p>
    </div>

    <!-- ── DETAIL VIEW ── -->
    <div id="detail-view" class="view">
      <header class="detail-header">
        <button id="back-btn" class="back-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M15 18l-6-6 6-6"/>
          </svg>
          <span>Alle emner</span>
        </button>
        <span class="detail-cat-pill" id="detail-cat-pill"></span>
      </header>
      <main id="detail-content" class="detail-content"></main>
    </div>

  </div>

  <script src="js/topics.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
