<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HackIdle</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="css/map.css">
  <link rel="stylesheet" href="css/files.css">
  <link rel="stylesheet" href="css/programs.css">
</head>
<body>
  <div id="scale-root">
  <div id="app">

    <nav id="sidebar">
      <div class="sidebar-brand">IDLEHACKER</div>

      <div class="nav-group">
        <button class="nav-item active" data-view="dashboard" onclick="setView('dashboard')">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="2" y="2" width="7" height="7" rx="1.5"/>
            <rect x="11" y="2" width="7" height="7" rx="1.5"/>
            <rect x="2" y="11" width="7" height="7" rx="1.5"/>
            <rect x="11" y="11" width="7" height="7" rx="1.5"/>
          </svg>
          Dashboard
        </button>
        <button class="nav-item" data-view="hardware" onclick="setView('hardware')">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="3" y="3" width="14" height="14" rx="2"/>
            <rect x="7" y="7" width="6" height="6" rx="1"/>
            <line x1="7" y1="3" x2="7" y2="1"/><line x1="10" y1="3" x2="10" y2="1"/><line x1="13" y1="3" x2="13" y2="1"/>
            <line x1="7" y1="17" x2="7" y2="19"/><line x1="10" y1="17" x2="10" y2="19"/><line x1="13" y1="17" x2="13" y2="19"/>
            <line x1="3" y1="7" x2="1" y2="7"/><line x1="3" y1="10" x2="1" y2="10"/><line x1="3" y1="13" x2="1" y2="13"/>
            <line x1="17" y1="7" x2="19" y2="7"/><line x1="17" y1="10" x2="19" y2="10"/><line x1="17" y1="13" x2="19" y2="13"/>
          </svg>
          Hardware
        </button>
        <button class="nav-item" data-view="blackmarket" onclick="setView('blackmarket')">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <polyline points="4,7 2,10 4,13"/>
            <polyline points="16,7 18,10 16,13"/>
            <line x1="8" y1="4" x2="12" y2="16"/>
          </svg>
          Black Market
        </button>
        <button class="nav-item" data-view="messages" onclick="setView('messages')">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="2" y="4" width="16" height="13" rx="2"/>
            <polyline points="2,4 10,12 18,4"/>
          </svg>
          Messages
          <span class="nav-badge" id="msg-badge" style="display:none">0</span>
        </button>
        <button class="nav-item" data-view="files" onclick="setView('files')">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M3 6a2 2 0 0 1 2-2h3l2 2h5a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          </svg>
          Files
        </button>
        <button class="nav-item" data-view="programs" onclick="setView('programs')">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="2" y="3" width="16" height="13" rx="2"/>
            <polyline points="6,7.5 8.5,10 6,12.5"/>
            <line x1="10.5" y1="12.5" x2="14" y2="12.5"/>
          </svg>
          Programs
        </button>
        <button class="nav-item" data-view="map" onclick="setView('map')">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <polygon points="2,4 8,2 12,4 18,2 18,16 12,18 8,16 2,18"/>
            <line x1="8" y1="2" x2="8" y2="16"/>
            <line x1="12" y1="4" x2="12" y2="18"/>
          </svg>
          Map
        </button>
      </div>

      <div class="nav-footer">
        <button class="nav-item nav-disabled" data-view="settings">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="10" cy="10" r="3"/>
            <path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.22 4.22l1.42 1.42M14.36 14.36l1.42 1.42M4.22 15.78l1.42-1.42M14.36 5.64l1.42-1.42"/>
          </svg>
          Settings
        </button>

        <div class="sidebar-balance">
          <div class="balance-row">
            <span class="balance-label">BALANCE</span>
            <span id="balance" class="balance-value">$0.00</span>
          </div>
          <div class="balance-row">
            <span class="balance-label">INCOME</span>
            <span id="income-rate" class="income-value">$0.00/s</span>
          </div>
        </div>
      </div>
    </nav>

    <div id="main-wrapper">
      <div id="content"></div>
    </div>

  </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/map-data.js"></script>
  <script src="js/game.js"></script>
  <script src="js/map.js"></script>
  <script src="js/inventory.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/map-ui.js"></script>
  <script src="js/files-ui.js"></script>
  <script src="js/programs-ui.js"></script>
</body>
</html>
